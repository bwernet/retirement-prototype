<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The platform loop — trusted guidance to timely support</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root {
    --ink: #161D24; --muted: #6E6E7D; --border: #E2E2E5; --canvas: #F7F8FA;
    --teal-text: #078375;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--canvas); }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--canvas); color: var(--ink);
    font-size: 15px; line-height: 1.45; padding: 22px 16px 16px; }
  .wrap { max-width: 460px; margin: 0 auto; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: .15em; text-transform: uppercase;
    color: #1C5C98; text-align: center; margin-bottom: 18px; }
  .serifvoice { font-family: Georgia, 'Times New Roman', serif; }

  /* ---- the loop ---- */
  #loop { position: relative; padding-right: 46px; }
  .stage { font: inherit; display: block; width: 100%; text-align: left; background: #fff;
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; cursor: pointer;
    color: inherit; transition: border-color 160ms ease, box-shadow 160ms ease; }
  .stage:hover { border-color: #C9CBD1; }
  .stage[aria-pressed="true"] { border-color: var(--ink); box-shadow: inset 0 0 0 1px var(--ink); }
  .stage:focus-visible { outline: 2px solid #1C5C98; outline-offset: 2px; }
  .stage .tag { display: block; font-size: 10px; font-weight: 500; letter-spacing: .14em;
    text-transform: uppercase; color: var(--teal-text); }
  .stage .phrase { display: block; font-size: 14.5px; font-weight: 500; letter-spacing: -0.005em; margin-top: 2px; }
  .down { display: flex; justify-content: center; padding: 4px 0; color: #9D9DA8; }
  /* return bracket: stage 4 loops back up to stage 1 — CSS borders keep the corners circular */
  #returnArrow { position: absolute; right: 8px; top: 29px; bottom: 29px; width: 30px;
    border: 1.5px solid #9D9DA8; border-left: none; border-radius: 0 12px 12px 0; pointer-events: none; }
  #returnArrow .tip { position: absolute; left: -3px; top: -8px; color: #9D9DA8; }

  /* ---- reveal (fixed height — nothing reflows on hover) ---- */
  #reveal { min-height: 66px; margin-top: 16px; text-align: center; font-size: 14.5px; line-height: 1.6;
    color: var(--muted); opacity: 1; transition: opacity 160ms ease; }
  @media (prefers-reduced-motion: reduce) { #reveal, .stage { transition: none !important; } }

  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }

  /* mobile: fill the frame instead of capping at the 460px reading width */
  @media (max-width: 560px) {
    body { padding-left: 12px; padding-right: 12px; }
    .wrap { max-width: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Silvur — white-label platform</p>

  <div id="loop">
    <button class="stage" data-stage="trust" aria-pressed="true">
      <span class="tag">Trust</span>
      <span class="phrase">Trusted credit-union relationship</span>
    </button>
    <div class="down" aria-hidden="true"><svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 1v13M1 10.5 5 14.5l4-4"/></svg></div>
    <button class="stage" data-stage="experience" aria-pressed="false">
      <span class="tag">Experience</span>
      <span class="phrase">Branded retirement experience</span>
    </button>
    <div class="down" aria-hidden="true"><svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 1v13M1 10.5 5 14.5l4-4"/></svg></div>
    <button class="stage" data-stage="insight" aria-pressed="false">
      <span class="tag">Insight</span>
      <span class="phrase">Members explore financial decisions</span>
    </button>
    <div class="down" aria-hidden="true"><svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 1v13M1 10.5 5 14.5l4-4"/></svg></div>
    <button class="stage" data-stage="action" aria-pressed="false">
      <span class="tag">Action</span>
      <span class="phrase">Credit union sees needs and responds</span>
    </button>
    <span id="returnArrow" aria-hidden="true"><svg class="tip" width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1 1.5 7.5 8 14"/></svg></span>
  </div>

  <p id="reveal" class="serifvoice" aria-live="polite">“This is an incredible value to get through my credit union.”</p>
</div>
<script>
(() => {
  const reveal = document.getElementById('reveal');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)');

  const POINTS = {
    trust: '“This is an incredible value to get through my credit union.”',
    experience: 'Members received holistic retirement guidance through an institution they already knew.',
    insight: 'On-platform activity revealed topics and decisions traditional credit-union systems could not see.',
    action: 'Teams could turn those signals into campaign audiences and relevant outreach.',
  };

  let shown = 'trust';
  function show(id) {
    if (id === shown) return;
    shown = id;
    for (const b of document.querySelectorAll('.stage')) b.setAttribute('aria-pressed', String(b.dataset.stage === id));
    // swap text synchronously, then fade in from 0 — no timers (throttled offscreen)
    reveal.textContent = POINTS[id];
    if (!reduced.matches) { reveal.style.opacity = '0'; void reveal.offsetWidth; reveal.style.opacity = '1'; }
    postHeight();
  }

  for (const b of document.querySelectorAll('.stage')) {
    b.addEventListener('mouseenter', () => show(b.dataset.stage));
    b.addEventListener('focus', () => show(b.dataset.stage));
    b.addEventListener('click', () => show(b.dataset.stage));
  }

  function postHeight() {
    window.parent.postMessage({ type: 'platform-loop:height', height: document.documentElement.scrollHeight }, '*');
  }
  postHeight(); // synchronous first post — rAF is throttled in offscreen iframes
  addEventListener('resize', () => requestAnimationFrame(postHeight));
})();
</script>
</body>
</html>
